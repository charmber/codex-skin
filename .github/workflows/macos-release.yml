name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js for static tests
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < macos/VERSION)"
          test -n "$version"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "${GITHUB_REF_NAME#v}" = "$version"
          fi

      - name: Build unsigned DMG
        shell: bash
        run: |
          set -euo pipefail
          export NODE="$(command -v node)"
          export CODEX_DREAM_SKIN_SKIP_RUNTIME_TESTS=true
          ./macos/scripts/build-dmg.sh --unsigned

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Dream-Skin-macOS-unsigned
          path: |
            macos/release/*.dmg
            macos/release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            if ! gh release create "$GITHUB_REF_NAME" --generate-notes --title "Codex Dream Skin $GITHUB_REF_NAME"; then
              sleep 5
              gh release view "$GITHUB_REF_NAME" >/dev/null
            fi
          fi
          gh release upload "$GITHUB_REF_NAME" \
            macos/release/*.dmg \
            macos/release/SHA256SUMS.txt \
            --clobber
