name: macOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
      KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js for static tests
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Validate release version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < macos/VERSION)"
          test -n "$version"
          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            test "${GITHUB_REF_NAME#v}" = "$version"
          fi

      - name: Validate signing secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "$MACOS_CERTIFICATE_P12_BASE64"
          test -n "$MACOS_CERTIFICATE_PASSWORD"
          test -n "$MACOS_CODESIGN_IDENTITY"
          test -n "$APPLE_API_KEY_ID"
          test -n "$APPLE_API_ISSUER_ID"
          test -n "$APP_STORE_CONNECT_API_KEY_P8"

      - name: Import Developer ID certificate
        shell: bash
        run: |
          set -euo pipefail
          certificate="$RUNNER_TEMP/developer-id.p12"
          keychain="$RUNNER_TEMP/codex-dream-skin.keychain-db"
          printf '%s' "$MACOS_CERTIFICATE_P12_BASE64" | /usr/bin/base64 -D > "$certificate"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain"
          security import "$certificate" -k "$keychain" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain"
          security list-keychains -d user -s "$keychain" login.keychain-db

      - name: Prepare notarization key
        shell: bash
        run: |
          set -euo pipefail
          key="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$key"
          chmod 600 "$key"
          echo "APPLE_API_KEY_PATH=$key" >> "$GITHUB_ENV"

      - name: Build, sign, and notarize DMG
        shell: bash
        run: |
          set -euo pipefail
          ./macos/scripts/build-dmg.sh \
            --identity "$MACOS_CODESIGN_IDENTITY" \
            --notarize

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Codex-Dream-Skin-macOS
          path: |
            macos/release/*.dmg
            macos/release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --generate-notes --title "Codex Dream Skin $GITHUB_REF_NAME"
          fi
          gh release upload "$GITHUB_REF_NAME" \
            macos/release/*.dmg \
            macos/release/SHA256SUMS.txt \
            --clobber

      - name: Remove temporary signing keychain
        if: always()
        shell: bash
        run: |
          security delete-keychain "$RUNNER_TEMP/codex-dream-skin.keychain-db" 2>/dev/null || true
